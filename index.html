<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的个人主页</title>
    <style>
        /* 这里的 CSS 负责给两个部分“划边界” */
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f4f9; }
        
        .content-section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        #game-container { background: #fffbe6; padding: 20px; border: 2px dashed #ffda44; border-radius: 10px; text-align: center; position: relative; min-height: 300px; }
        
        #target { font-size: 80px; cursor: pointer; user-select: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="content-section">
        <h1>你好，欢迎来到我的网站</h1>
        <p>这是我的第一个 GitHub 页面。我正在学习网页开发和神经科学。</p>
        <p>往下看，这里有一个我刚加入的小游戏！</p>
    </div>

    <div id="game-container">
        <h2>点中那个大脑 (得分: <span id="score">0</span>)</h2>
        <p>看你能不能抓到它：</p>
        <div id="target">🧠</div>
    </div>
<div class="content-section">
    <h2>我的日常记账本</h2>
    
    <div style="margin-bottom: 15px;">
        <input type="text" id="item-name" placeholder="消费项目（如：午餐）" style="padding: 5px;">
        <input type="number" id="item-amount" placeholder="金额" style="padding: 5px; width: 80px;">
        <button onclick="addRecord()" style="padding: 5px 15px; cursor: pointer;">添加记录</button>
    </div>

    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background: #eee;">
                <th style="border: 1px solid #ccc; padding: 8px;">项目</th>
                <th style="border: 1px solid #ccc; padding: 8px;">金额</th>
                <th style="border: 1px solid #ccc; padding: 8px;">操作</th>
            </tr>
        </thead>
        <tbody id="record-list">
            </tbody>
        <tfoot>
            <tr>
                <td style="font-weight: bold; padding: 8px;">总计：</td>
                <td id="total-amount" style="font-weight: bold; padding: 8px;">0</td>
                <td></td>
            </tr>
        </tfoot>
    </table>
    <button onclick="clearAll()" style="margin-top: 10px; color: red; font-size: 12px;">清空所有记录</button>
</div>

<script>
    // 页面加载时自动读取保存的数据
    window.onload = function() {
        displayRecords();
    };

    function addRecord() {
        const name = document.getElementById('item-name').value;
        const amount = parseFloat(document.getElementById('item-amount').value);

        if (name === '' || isNaN(amount)) {
            alert("请输入项目名称和金额！");
            return;
        }

        const record = { name: name, amount: amount };
        
        // 从本地存储获取旧数据，加入新数据，再存回去
        let records = JSON.parse(localStorage.getItem('myAccountData')) || [];
        records.push(record);
        localStorage.setItem('myAccountData', JSON.stringify(records));

        // 清空输入框
        document.getElementById('item-name').value = '';
        document.getElementById('item-amount').value = '';

        displayRecords();
    <script>
        // 游戏逻辑保持独立
        let score = 0;
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score');
        const container = document.getElementById('game-container');

        target.onclick = function() {
            score++;
            scoreDisplay.innerText = score;
            
            // 限制大脑只在游戏容器范围内移动
            const maxX = container.clientWidth - 100;
            const maxY = container.clientHeight - 150;
            
            target.style.position = 'absolute';
            target.style.left = Math.random() * maxX + 'px';
            target.style.top = (Math.random() * maxY + 80) + 'px'; // 避开标题位置
        };
    </script>

</body>
</html>
